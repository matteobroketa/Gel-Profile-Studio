name: Bug report
description: Report a reproducible problem in Gel Profile Studio
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not upload unpublished, confidential, patient-identifiable, or proprietary gel images. Use a synthetic or non-sensitive example where possible."
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the image format, browser, lane/settings workflow, and export type where relevant.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Sanitized screenshots, console errors, or synthetic test data only.
